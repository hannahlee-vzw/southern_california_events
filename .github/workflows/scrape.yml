name: Scrape Events

on:
  schedule:
    # Every day at 8:00 AM Pacific Time (15:00 UTC, 16:00 UTC during daylight saving)
    # Adjust the hour if the wrong time is observed.
    - cron: '0 15 * * *'
  workflow_dispatch:  # also allows manual "Run workflow" button in GitHub Actions UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit and push docs/ back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run scraper
        run: python main.py

      - name: Commit and push updated docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if something changed (git diff --staged --quiet exits 0 = no changes)
          git diff --staged --quiet || git commit -m "Update events: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
